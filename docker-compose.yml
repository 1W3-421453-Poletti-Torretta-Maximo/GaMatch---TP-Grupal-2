version: '3.9'

services:
  neo4j:
    image: neo4j:5.21-community
    container_name: gamatch-neo4j
    ports:
      - '7474:7474'   # Neo4j Browser
      - '7687:7687'   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/gamatch_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD', 'neo4j', 'status']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gamatch-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
